    <style>
        :root { --primary: #4b0082; --secondary: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #fff; }

        .main-card { max-width: 400px; width: 92%; background: #121212; padding: 25px; border-radius: 30px; border: 1px solid #333; text-align: center; margin: 20px 0; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        
        .jesus-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--secondary); margin: 0 auto 15px; display: block; }

        .date-container {
            background: linear-gradient(90deg, #d81b60, #8e44ad);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .brand-name { font-size: 26px; font-weight: 900; color: var(--secondary); margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }

        .btn-style { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px 20px; 
            color: white; 
            text-decoration: none; 
            border-radius: 15px; 
            font-weight: bold; 
            margin: 12px 0; 
            background: #1e1e1e; 
            border: 1px solid #333; 
        }
        
        .color-0 { border-left: 5px solid #f1c40f; } .color-1 { border-left: 5px solid #3498db; }
        .color-2 { border-left: 5px solid #e91e63; } .color-3 { border-left: 5px solid #00bcd4; }
        .color-4 { border-left: 5px solid #4caf50; } .color-5 { border-left: 5px solid #9c27b0; }
        .color-6 { border-left: 5px solid #607d8b; }

        .profile-container { position: relative; width: 105px; height: 105px; margin: 30px auto 10px; display: flex; align-items: center; justify-content: center; }
        .rainbow-border { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8); animation: rotate 3s linear infinite; }
        .user-img { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; position: relative; z-index: 2; border: 2px solid #000; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://i.postimg.cc/QtvPx0B6/images-(20).jpg" class="jesus-img">

    <div class="date-container" id="live-date">📅 Tarehe...</div>

    <div class="brand-name">MOSHA BIBILIA</div>

    <div id="bibilia-box"></div>

    <span style="display:block; font-size:18px; font-weight:bold; color:#fff; margin-top:20px;">GILBERT MOSHA</span>
    <p style="color:var(--secondary); font-size: 14px; margin-top: 5px;">0793770731</p>

    <div class="profile-container">
        <div class="rainbow-border"></div>
        <img src="https://i.ibb.co/mVcyBZf3/1766639899602.png" class="user-img">
    </div>
</div>

<script>
    function generateButtons() {
        const bibiliaContainer = document.getElementById('bibilia-box');
        const now = new Date();
        const sikuZaWiki = ["JUMAPILI", "JUMATATU", "JUMANNE", "JUMATANO", "ALHAMISI", "IJUMAA", "JUMAMOSI"];
        const miezi = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ago", "Sep", "Okt", "Nov", "Des"];

        document.getElementById('live-date').innerHTML = `✨ LEO: ${now.getDate()} ${miezi[now.getMonth()]} ${now.getFullYear()} ✨`;

        const startBibilia = new Date(2026, 1, 24); 
        let tempDate = new Date(startBibilia);
        bibiliaContainer.innerHTML = ""; 

        while (tempDate <= now) {
            let d = String(tempDate.getDate()).padStart(2, '0');
            let m = String(tempDate.getMonth() + 1).padStart(2, '0');
            let fileName = `${d}-${m}-${tempDate.getFullYear()}.html`;
            
            bibiliaContainer.innerHTML += `
                <a href="${fileName}" class="btn-style color-${tempDate.getDay()}">
                    <span>🗓️ ${sikuZaWiki[tempDate.getDay()]}</span>
                    <span style="font-size:12px; color:#aaa;">${d} ${miezi[tempDate.getMonth()]}</span>
                </a>
            `;
            tempDate.setDate(tempDate.getDate() + 1);
        }
    }
    generateButtons();
</script>
</body>
</html>
